apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: langchain-tutorial
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
        autoscaling.knative.dev/minScale: '0'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      # Firestore / Firebase Auth にアクセスするためのサービスアカウント
      serviceAccountName: YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com
      containers:
      - image: gcr.io/PROJECT_ID/langchain-tutorial
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: '8080'
        - name: FIREBASE_PROJECT_ID
          value: YOUR_FIREBASE_PROJECT_ID
        - name: CORS_ORIGIN
          value: https://YOUR_PROJECT_ID.web.app
        # GOOGLE_API_KEY は Secret Manager で管理する（平文で設定しないこと）
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: GOOGLE_API_KEY
              key: latest
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
  traffic:
  - percent: 100
    latestRevision: true
