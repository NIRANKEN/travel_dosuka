publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_crashlytics: ^5.0.7
  firebase_storage: ^13.0.6
  cloud_firestore: ^6.1.2
  firebase_app_check: ^0.4.1+4
  firebase_analytics: ^12.1.1
  firebase_auth: ^6.1.4
  go_router: ^14.8.1
  provider: ^6.0.5
  logger: ^2.5.0
  shared_preferences: ^2.1.0
  google_sign_in: ^6.2.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  lints: ^6.0.0

flutter:
  uses-material-design: true
